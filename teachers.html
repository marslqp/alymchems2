<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Educators | AlymChems</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            background: rgba(255,255,255,0.03);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
        }
        h1 { font-size: 40px; color: #38bdf8; margin-bottom: 10px; letter-spacing: 2px; }
        .subtitle { color: #94a3b8; margin-bottom: 40px; }
        
        .slider { position: relative; display: flex; flex-direction: column; align-items: center; min-height: 400px; }
        .avatar {
            width: 200px; height: 200px; border-radius: 50%;
            object-fit: cover; border: 4px solid #2563eb;
            margin-bottom: 25px; box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }
        .name { font-size: 28px; font-weight: 600; margin-bottom: 15px; color: #fff; }
        .text { font-size: 18px; color: #cbd5e1; line-height: 1.8; font-style: italic; max-width: 700px; }

        .arrow {
            position: absolute; top: 30%; font-size: 40px;
            cursor: pointer; color: #38bdf8; transition: 0.3s;
            user-select: none;
        }
        .arrow:hover { color: white; transform: scale(1.2); }
        .left { left: -60px; }
        .right { right: -60px; }

        .dot {
            display: inline-block; width: 12px; height: 12px;
            margin: 8px; background: rgba(255,255,255,0.2);
            border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        .active { background: #38bdf8; transform: scale(1.3); box-shadow: 0 0 10px #38bdf8; }
        
        @media(max-width: 600px) {
            .arrow { position: static; margin: 20px; }
            .slider { flex-direction: row; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>MEET OUR TEACHERS</h1>
    <div class="subtitle">The experts guiding you through the world of atoms</div>
    <div class="slider">
        <div class="arrow left" onclick="prev()">❮</div>
        <img id="avatar" class="avatar" src="">
        <h2 id="name" class="name"></h2>
        <p id="text" class="text"></p>
        <div class="arrow right" onclick="next()">❯</div>
    </div>
    <div class="dots" id="dots"></div>
    <button onclick="location.href='index.html'" style="margin-top:30px; background:none; border:none; color:#38bdf8; cursor:pointer;">← Back to Home</button>
</div>

<script>
const teachers = [
    { name: "Anthony Belay", text: "Expert in Organic Chemistry with 10+ years of teaching experience. 'Chemistry isn't just a subject, it's the language of the universe.'", img: "https://images.unsplash.com/photo-1568602471122-7832951cc4c5" },
    { name: "Mrs. Elena Petrova", text: "Winner of 'Teacher of the Year'. Specialist in Analytical Chemistry and laboratory safety.", img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2" },
    { name: "Mr. Asrat", text: "Passionate about making complex reactions simple. Leads our Chemistry Olympiad team.", img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e" }
];
let index = 0;
function render() {
    const t = teachers[index];
    document.getElementById("avatar").src = t.img;
    document.getElementById("name").innerText = t.name;
    document.getElementById("text").innerText = `"${t.text}"`;
    const dots = document.getElementById("dots");
    dots.innerHTML = "";
    teachers.forEach((_, i) => {
        const dot = document.createElement("span");
        dot.className = "dot" + (i === index ? " active" : "");
        dot.onclick = () => { index = i; render(); };
        dots.appendChild(dot);
    });
}
function next() { index = (index + 1) % teachers.length; render(); }
function prev() { index = (index - 1 + teachers.length) % teachers.length; render(); }
render();
</script>
</body>
</html>
